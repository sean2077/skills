# Project-scoped Codex config (higher precedence than ~/.codex/config.toml).
#
# IMPORTANT — Codex trust gate: Codex only loads a project's .codex/ (config +
# hooks + agents) for a TRUSTED project. Until the project is trusted, the whole
# project-level .codex/ — including the worktree guard and the other hooks — is
# silently skipped. Trust it once, either way:
#   - run `codex` in this repo and accept the trust prompt, or
#   - add to ~/.codex/config.toml:
#       [projects."<this repo's absolute path>"]
#       trust_level = "trusted"
#
# This file intentionally sets nothing else; add project-level Codex settings
# below as needed (they take precedence over your user config for this repo).
