name: validate-skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Local equivalent: python scripts/validate_skills.py
      - name: Validate skills catalog
        run: python scripts/validate_skills.py
      # Local equivalent: bash scripts/check-agent-scaffold.sh
      - name: Check agent-scaffold invariants
        if: always() # run even if the catalog check failed — one run surfaces every failure
        run: bash scripts/check-agent-scaffold.sh
      # Local equivalent: shellcheck $(find scripts skills -type f -name '*.sh')  — shellcheck is preinstalled on ubuntu-latest
      - name: Shellcheck bundled scripts
        if: always()
        run: shellcheck $(find scripts skills -type f -name '*.sh')
      # Local equivalent: bash scripts/e2e-agent-scaffold.sh  (installs the harness into a throwaway repo and asserts it works)
      - name: E2E installer test (agent-scaffold)
        if: always()
        run: bash scripts/e2e-agent-scaffold.sh
