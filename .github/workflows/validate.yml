name: validate-skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Local equivalent: python3 scripts/validate_skills.py
      - run: python3 scripts/validate_skills.py
