name: validate-skills

on:
  push:
  pull_request:

jobs:
  validate:
    name: validate (${{ matrix.os }})
    env:
      # Windows otherwise defaults Path.read_text() and redirected stdout to a
      # legacy code page, which breaks UTF-8 skill files and non-ASCII repo paths.
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      # checkout must see the global value before it materializes tracked 120000 entries.
      - name: Enable native symlink checkout (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: git config --global core.symlinks true

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Assert platform shell and real checkout links
        env:
          EXPECTED_OS: ${{ runner.os }}
        run: |
          bash --version | head -1
          case "$EXPECTED_OS" in
            macOS)
              [[ ${BASH_VERSINFO[0]} -eq 3 ]]
              ;;
            Windows)
              case "$(uname -s)" in MINGW*|MSYS*) ;; *) exit 1 ;; esac
              git config --local core.symlinks true
              rm -f CLAUDE.md
              git checkout -- CLAUDE.md
              ;;
          esac
          test -L CLAUDE.md
          test "$(readlink CLAUDE.md)" = AGENTS.md

      - name: Install pinned validation dependencies
        run: python -m pip install -r requirements-validation.txt

      - name: Validate catalog rules
        run: |
          python scripts/validate_skills.py
          python scripts/test_validate_skills.py
          python scripts/tests/test_semver_release_plan.py

      - name: Validate official Agent Skills specification
        run: |
          for skill in skills/*; do
            [[ -d "$skill" ]] && python -m skills_ref.cli validate "$skill"
          done

      - name: Check agent-scaffold invariants
        if: always()
        run: |
          python scripts/tests/test_agent_scaffold_core.py
          bash scripts/check-agent-scaffold.sh

      - name: Exercise tooling manifest reconciliation
        if: always()
        run: bash scripts/tests/test-tooling-manifest.sh

      - name: E2E installer test with mandatory real links
        if: always()
        env:
          AGENT_SCAFFOLD_E2E_REQUIRE_SYMLINKS: "1"
        run: bash scripts/e2e-agent-scaffold.sh

      - name: Smoke-test real npx skills discovery
        if: always()
        run: |
          set +e
          output="$(NO_COLOR=1 DISABLE_TELEMETRY=1 npx --yes skills@1.5.17 add . -l 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ]; then
            printf 'npx discovery command failed with status %s\n' "$status" >&2
            exit "$status"
          fi
          actual="$(printf '%s\n' "$output" | tr -d '\r' | sed -n 's/^.*    \([a-z0-9][a-z0-9-]*\)$/\1/p' | sort)"
          expected="$(python -c 'from pathlib import Path; print("\n".join(sorted(path.name for path in Path("skills").iterdir() if path.is_dir())))' | tr -d '\r')"
          if [ "$actual" != "$expected" ]; then
            printf 'npx discovery mismatch\nexpected:\n%s\nactual:\n%s\n' "$expected" "$actual" >&2
            exit 1
          fi

      - name: Smoke-test installed category references
        if: always()
        run: |
          repo="$(pwd)"
          source="$repo"
          case "$(uname -s)" in MINGW*|MSYS*) source="$(pwd -W)" ;; esac
          fixture="$(mktemp -d)"
          trap 'rm -rf "$fixture"' EXIT
          git -C "$fixture" init -q
          (
            cd "$fixture"
            NO_COLOR=1 DISABLE_TELEMETRY=1 npx --yes skills@1.5.17 add "$source" -a codex -y
          )
          for source_refs in "$repo"/skills/*/references; do
            [ -d "$source_refs" ] || continue
            skill="$(basename "$(dirname "$source_refs")")"
            installed_refs="$fixture/.agents/skills/$skill/references"
            test -d "$installed_refs"
            expected="$(cd "$(dirname "$source_refs")" && find references -type f -print | sort)"
            actual="$(cd "$fixture/.agents/skills/$skill" && find references -type f -print | sort)"
            if [ "$actual" != "$expected" ]; then
              printf '%s installed references mismatch\nexpected:\n%s\nactual:\n%s\n' "$skill" "$expected" "$actual" >&2
              exit 1
            fi
            diff -ru "$source_refs" "$installed_refs"
          done

      - name: Shellcheck bundled scripts
        if: always() && runner.os == 'Linux'
        run: |
          find scripts skills -type f -name '*.sh' -print0 | xargs -0 shellcheck
